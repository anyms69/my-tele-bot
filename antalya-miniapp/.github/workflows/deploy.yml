name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          # Укажи имя своего репозитория здесь (с /слэшами/)
          # Если репо называется "my-app" → VITE_BASE_PATH=/my-app/
          # Если репо username.github.io  → VITE_BASE_PATH=/
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/my-tele-bot/' }}
          VITE_BOT_TOKEN: ${{ secrets.VITE_BOT_TOKEN }}
          VITE_OWNER_CHAT_ID: ${{ secrets.VITE_OWNER_CHAT_ID }}
          VITE_PAYMENT_PROVIDER_TOKEN: ${{ secrets.VITE_PAYMENT_PROVIDER_TOKEN }}
          VITE_SHEETS_URL: ${{ secrets.VITE_SHEETS_URL }}

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
