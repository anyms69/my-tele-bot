<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Antalya Guide</title>
<script>
  // GitHub Pages SPA workaround
  // Сохраняем текущий URL в sessionStorage и редиректим на index.html
  sessionStorage.redirect = location.href;
  window.location.replace(
    location.protocol + '//' + location.host +
    location.pathname.split('/').slice(0, 2).join('/')
  );
</script>
</head>
<body></body>
</html>
