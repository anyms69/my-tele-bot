
name: Unzip project

on:
  push:
    paths:
      - '*.zip'
      - '**.zip'

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Unzip all zip files
        run: |
          for zip in *.zip; do
            if [ -f "$zip" ]; then
              echo "Распаковываю $zip"
              unzip -o "$zip" -d ./
              rm "$zip"
            fi
          done

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'actions@github.com'
          git add .
          git commit -m "Автоматическая распаковка ZIP" || echo "Нет изменений"
          git push
