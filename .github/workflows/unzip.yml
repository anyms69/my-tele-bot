name: Auto Unzip

on:
  push:
    paths:
      - '**.zip'
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract all zip files
        run: |
          find . -name "*.zip" -type f | while read zip; do
            echo "📦 Распаковка: $zip"
            dir=$(dirname "$zip")
            unzip -o "$zip" -d "$dir"
            rm -v "$zip"
          done

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          if git diff --staged --quiet; then
            echo "✅ Нет изменений"
          else
            git commit -m "Автоматическая распаковка ZIP"
            git push
          fi
